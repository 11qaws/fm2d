<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Tactics Maker Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gif.js/0.2.0/gif.js"></script>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; background: #f0f2f5; user-select: none; color: #333; margin: 20px; }
        #controls, #editor-container { 
            max-width: 950px; margin: 0 auto 10px auto; background: white; 
            padding: 15px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); 
        }
        #controls { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
        
        button { padding: 6px 12px; cursor: pointer; font-weight: bold; border: none; border-radius: 4px; transition: 0.2s; }
        button:hover { filter: brightness(90%); }
        input[type="number"] { width: 45px; text-align: center; border: 1px solid #ccc; border-radius: 4px; padding: 4px;}
        input[type="color"] { width: 28px; height: 28px; padding: 0; border: none; cursor: pointer; }
        
        canvas { background: #27ae60; display: block; margin: 0 auto; box-shadow: 0 5px 15px rgba(0,0,0,0.2); border-radius: 8px; }
        
        .kf-row { display: flex; gap: 5px; align-items: center; background: #f8f9fa; padding: 5px 10px; border-radius: 4px; border: 1px solid #ddd; font-size: 13px; }
        .kf-input { width: 50px !important; font-weight: bold; color: #d35400; }
        .btn-del { background: #e74c3c; color: white; padding: 2px 6px; font-size: 12px; }
        .badge { background: #34495e; color: white; padding: 2px 6px; border-radius: 4px; font-size: 11px; }
    </style>
</head>
<body>

<div id="controls">
    <button id="btnFormation" style="background:#8e44ad; color:white;">🏟 4-4-2 자동 배치</button>
    <div style="border-left: 2px solid #eee; height: 20px; margin: 0 5px;"></div>
    
    <input type="color" id="homeColor" value="#e74c3c"><label><input type="radio" name="type" value="home" checked>홈</label>
    <input type="color" id="awayColor" value="#3498db"><label><input type="radio" name="type" value="away">어웨이</label>
    <label><input type="radio" name="type" value="ball">공</label>
    <input type="number" id="numInput" value="1" min="1" max="99">
    
    <label style="margin-left: auto; color:#7f8c8d; font-weight:bold;">
        <input type="checkbox" id="cleanView"> 👁️ 선 숨기기 (클린 뷰)
    </label>
    <button id="resetBtn" style="background:#e74c3c; color:white;">전체 초기화</button>
</div>

<canvas id="cv" width="800" height="500"></canvas>

<div id="editor-container">
    <div style="display:flex; gap:10px; align-items:center; margin-bottom:15px; border-bottom:1px solid #eee; padding-bottom:10px;">
        <button id="playBtn" style="background:#2ecc71; color:white;">▶ 재생</button>
        <select id="speedSelect" style="padding:5px; border-radius:4px; border:1px solid #ccc;">
            <option value="2">0.5x 배속 (느리게)</option>
            <option value="1" selected>1.0x 배속 (정상)</option>
            <option value="0.5">2.0x 배속 (빠르게)</option>
        </select>
        
        <div style="margin-left:auto; display:flex; align-items:center; gap:10px;">
            <span class="badge">단축키: ← / →</span> 
            <strong>타임라인:</strong> 
            <input type="range" id="timeline" min="0" max="200" value="0" style="width:250px; cursor:pointer;">
            <span id="frameDisplay" style="font-weight:bold; width:30px; text-align:right;">0</span>/200
            <button id="exportBtn" style="background:#2980b9; color:white; margin-left:10px;">📷 GIF 추출</button>
        </div>
    </div>
    
    <div id="kfList"><span style="color:#7f8c8d; font-size:14px;">경기장 위의 선수나 공을 클릭하면 상세 편집, Undo, 자동 등속도 맞춤 메뉴가 나타납니다.</span></div>
</div>

<script>
const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');
const btnFormation = document.getElementById('btnFormation');
const homeColor = document.getElementById('homeColor');
const awayColor = document.getElementById('awayColor');
const numInput = document.getElementById('numInput');
const cleanView = document.getElementById('cleanView');
const resetBtn = document.getElementById('resetBtn');
const playBtn = document.getElementById('playBtn');
const speedSelect = document.getElementById('speedSelect');
const exportBtn = document.getElementById('exportBtn');
const timeline = document.getElementById('timeline');
const frameDisplay = document.getElementById('frameDisplay');
const kfList = document.getElementById('kfList');

let entities = [];
let isPlaying = false;
let currentFrame = 0;
let maxFrames = 200;
let draggedEntity = null;
let selectedEntity = null;
let animationTimer = null;

homeColor.addEventListener('input', () => render());
awayColor.addEventListener('input', () => render());
cleanView.addEventListener('change', () => render());
speedSelect.addEventListener('change', () => render());

// [디테일 복구 완료] 가장 아름다운 버전의 축구장 렌더링
function drawPitch() {
    ctx.fillStyle = "#27ae60"; ctx.fillRect(0, 0, cv.width, cv.height);
    
    // 잔디 패턴
    ctx.fillStyle = "#2ecc71";
    for(let i = 40; i < 720; i += 80) ctx.fillRect(i, 20, 40, 460);

    ctx.strokeStyle = "rgba(255, 255, 255, 0.7)"; ctx.lineWidth = 2;
    
    // 외곽선 및 중앙선
    ctx.strokeRect(40, 20, 720, 460);
    ctx.beginPath(); ctx.moveTo(400, 20); ctx.lineTo(400, 480); ctx.stroke();
    
    // 센터 서클 및 센터 스팟
    ctx.beginPath(); ctx.arc(400, 250, 70, 0, Math.PI * 2); ctx.stroke();
    ctx.beginPath(); ctx.arc(400, 250, 4, 0, Math.PI * 2); ctx.fillStyle = "white"; ctx.fill();
    
    // 페널티 박스 및 골 에어리어
    ctx.strokeRect(40, 100, 120, 300); ctx.strokeRect(640, 100, 120, 300);
    ctx.strokeRect(40, 180, 40, 140); ctx.strokeRect(720, 180, 40, 140);
    
    // 페널티 스팟
    ctx.beginPath(); ctx.arc(130, 250, 3, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(670, 250, 3, 0, Math.PI * 2); ctx.fill();

    // 페널티 아크
    ctx.beginPath(); ctx.arc(130, 250, 70, -0.9, 0.9); ctx.stroke();
    ctx.beginPath(); ctx.arc(670, 250, 70, Math.PI - 0.9, Math.PI + 0.9); ctx.stroke();
    
    // 골대 (그물망 느낌 반투명)
    ctx.fillStyle = "rgba(255,255,255,0.2)";
    ctx.fillRect(10, 210, 30, 80); ctx.fillRect(760, 210, 30, 80);
    ctx.strokeRect(10, 210, 30, 80); ctx.strokeRect(760, 210, 30, 80);
}

// 선형 보간 로직
function getInterpolatedPos(entity, frame) {
    const keys = Object.keys(entity.keyframes).map(Number).sort((a,b)=>a-b);
    if (!keys.length) return null;
    if (frame <= keys[0]) return entity.keyframes[keys[0]];
    if (frame >= keys[keys.length - 1]) return entity.keyframes[keys[keys.length - 1]];
    
    let f1 = keys[0], f2 = keys[keys.length - 1];
    for (let f of keys) { if (f <= frame) f1 = f; if (f >= frame) { f2 = f; break; } }
    
    const p1 = entity.keyframes[f1], p2 = entity.keyframes[f2];
    const ratio = (frame - f1) / (f2 - f1);
    return { x: p1.x + (p2.x - p1.x) * ratio, y: p1.y + (p2.y - p1.y) * ratio };
}

// 전체 렌더링
function render(forceClean = false) {
    drawPitch();
    const isClean = forceClean || cleanView.checked;

    if (!isClean) {
        entities.forEach(e => {
            const keys = Object.keys(e.keyframes).map(Number).sort((a,b)=>a-b);
            if (keys.length > 1) {
                ctx.beginPath();
                ctx.strokeStyle = e.isBall ? "rgba(255,255,255,0.6)" : "rgba(241,196,15,0.8)";
                ctx.setLineDash(e.isBall ? [] : [4, 4]);
                ctx.moveTo(e.keyframes[keys[0]].x, e.keyframes[keys[0]].y);
                for (let i = 1; i < keys.length; i++) ctx.lineTo(e.keyframes[keys[i]].x, e.keyframes[keys[i]].y);
                ctx.stroke(); ctx.setLineDash([]);
                
                // 선택된 객체 경로 노드 표시
                if (e === selectedEntity) {
                    for (let i = 0; i < keys.length; i++) {
                        ctx.beginPath(); ctx.arc(e.keyframes[keys[i]].x, e.keyframes[keys[i]].y, 4, 0, Math.PI*2);
                        ctx.fillStyle = "#e67e22"; ctx.fill(); ctx.stroke();
                    }
                }
            }
        });
    }

    entities.forEach(e => {
        const p = getInterpolatedPos(e, currentFrame);
        if (!p) return;
        
        // 선택 하이라이트
        if (e === selectedEntity && !isClean) {
            ctx.beginPath(); ctx.arc(p.x, p.y, e.isBall ? 11 : 18, 0, Math.PI * 2);
            ctx.strokeStyle = "#f1c40f"; ctx.setLineDash([3, 3]); ctx.stroke(); ctx.setLineDash([]);
        }

        ctx.beginPath();
        if (e.isBall) {
            ctx.arc(p.x, p.y, 6, 0, Math.PI * 2);
            ctx.fillStyle = "white"; ctx.fill();
            ctx.strokeStyle = "black"; ctx.lineWidth = 1.5; ctx.stroke();
        } else {
            ctx.arc(p.x, p.y, 13, 0, Math.PI * 2);
            ctx.fillStyle = e.type === 'home' ? homeColor.value : awayColor.value; ctx.fill();
            ctx.strokeStyle = "white"; ctx.lineWidth = 2; ctx.stroke();
            ctx.fillStyle = "white"; ctx.font = "bold 11px Arial";
            ctx.textAlign = "center"; ctx.textBaseline = "middle";
            ctx.fillText(e.number, p.x, p.y);
        }
    });
}

// 키프레임 에디터 및 편의 기능 UI 동기화
function updateEditor() {
    if(!selectedEntity) {
        kfList.innerHTML = '<span style="color:#7f8c8d; font-size:14px;">객체(선수/공)를 클릭하면 프레임 편집기, Undo, 등속도 보정 메뉴가 나타납니다.</span>';
        return;
    }
    
    const name = selectedEntity.isBall ? '⚽ 공' : (selectedEntity.type === 'home' ? '🔴 홈' : '🔵 어웨이') + ' #' + selectedEntity.number;
    let html = `
        <div style="margin-bottom:10px; display:flex; align-items:center; gap:10px;">
            <b style="color:#2c3e50; font-size:15px;">선택됨: ${name}</b> 
            <button onclick="undoLastPath()" style="background:#34495e; color:white; margin-left:10px;">↩ 최근 경로 취소 (Undo)</button>
            <button onclick="applyAutoSpeed()" style="background:#f39c12; color:white;">✨ 구간 등속도 자동 맞춤</button>
        </div>
        <div style="display:flex; flex-wrap:wrap; gap:8px;">
    `;
    
    const keys = Object.keys(selectedEntity.keyframes).map(Number).sort((a,b)=>a-b);
    keys.forEach((f, i) => {
        html += `<div class="kf-row">P${i+1}: <input type="number" class="kf-input" data-old="${f}" value="${f}"><button class="btn-del" data-f="${f}">X</button></div>`;
    });
    kfList.innerHTML = html + "</div>";

    document.querySelectorAll('.kf-input').forEach(inp => {
        inp.addEventListener('change', e => {
            const oldF = +e.target.dataset.old; let newF = +e.target.value;
            if(newF < 0) newF = 0; if(newF > maxFrames) newF = maxFrames;
            while(selectedEntity.keyframes[newF] && newF !== oldF) newF++;
            selectedEntity.keyframes[newF] = selectedEntity.keyframes[oldF];
            delete selectedEntity.keyframes[oldF];
            updateEditor(); render();
        });
    });

    document.querySelectorAll('.btn-del').forEach(btn => {
        btn.addEventListener('click', e => {
            delete selectedEntity.keyframes[+e.target.dataset.f];
            if(!Object.keys(selectedEntity.keyframes).length) { entities = entities.filter(x => x !== selectedEntity); selectedEntity = null; }
            updateEditor(); render();
        });
    });
}

// ↩ 최근 경로 취소 (Undo)
window.undoLastPath = () => {
    if(!selectedEntity) return;
    const keys = Object.keys(selectedEntity.keyframes).map(Number).sort((a,b)=>a-b);
    if(keys.length > 1) delete selectedEntity.keyframes[keys[keys.length-1]];
    updateEditor(); render();
};

// ✨ 등속도 자동 보정
window.applyAutoSpeed = () => {
    if(!selectedEntity) return;
    const keys = Object.keys(selectedEntity.keyframes).map(Number).sort((a,b)=>a-b);
    if(keys.length < 3) return;
    let f1 = keys[0], f2 = keys[keys.length-1], tFrames = f2 - f1, tDist = 0, dists = [];
    
    for(let i=0; i<keys.length-1; i++) {
        let d = Math.hypot(selectedEntity.keyframes[keys[i+1]].x - selectedEntity.keyframes[keys[i]].x, selectedEntity.keyframes[keys[i+1]].y - selectedEntity.keyframes[keys[i]].y);
        dists.push(d); tDist += d;
    }
    if(!tDist) return;
    
    let newKf = { [f1]: selectedEntity.keyframes[f1] }, accum = f1;
    for(let i=0; i<keys.length-2; i++) {
        accum += (dists[i] / tDist) * tFrames;
        let nF = Math.round(accum);
        while(newKf[nF]) nF++;
        newKf[nF] = selectedEntity.keyframes[keys[i+1]];
    }
    newKf[f2] = selectedEntity.keyframes[f2];
    selectedEntity.keyframes = newKf;
    updateEditor(); render();
};

// 🏟 4-4-2 기본진영 셋업
btnFormation.addEventListener('click', () => {
    entities = []; currentFrame = 0; timeline.value = 0; frameDisplay.innerText = 0; selectedEntity = null;
    
    // 골키퍼 포함 4-4-2 좌표 하드코딩
    const homePos = [[80,250],[160,100],[160,200],[160,300],[160,400],[280,100],[280,200],[280,300],[280,400],[360,180],[360,320]];
    const awayPos = [[720,250],[640,100],[640,200],[640,300],[640,400],[520,100],[520,200],[520,300],[520,400],[440,180],[440,320]];
    
    homePos.forEach((p,i) => entities.push({isBall:false, type:'home', number:i+1, keyframes:{0:{x:p[0], y:p[1]}}}));
    awayPos.forEach((p,i) => entities.push({isBall:false, type:'away', number:i+1, keyframes:{0:{x:p[0], y:p[1]}}}));
    entities.push({isBall:true, type:'ball', number:'', keyframes:{0:{x:400, y:250}}});
    
    updateEditor(); render();
});

// 키보드 방향키 단축키 (프레임 1칸씩 이동)
document.addEventListener('keydown', e => {
    if (e.key === 'ArrowLeft') { currentFrame = Math.max(0, currentFrame - 1); timeline.value = currentFrame; frameDisplay.innerText = currentFrame; render(); }
    if (e.key === 'ArrowRight') { currentFrame = Math.min(maxFrames, currentFrame + 1); timeline.value = currentFrame; frameDisplay.innerText = currentFrame; render(); }
});

// 마우스 이벤트 (배치 및 드래그)
cv.addEventListener('mousedown', e => {
    if (isPlaying) return;
    const r = cv.getBoundingClientRect(); const x = e.clientX - r.left, y = e.clientY - r.top;
    
    let hit = null;
    for (let en of entities) {
        const p = getInterpolatedPos(en, currentFrame);
        if (p && Math.hypot(p.x - x, p.y - y) <= (en.isBall ? 7 : 14) + 5) { hit = en; break; }
    }
    
    if (hit) { draggedEntity = selectedEntity = hit; updateEditor(); render(); return; }
    
    const type = document.querySelector('input[name="type"]:checked').value;
    const isBall = type === 'ball';
    const newEn = { isBall: isBall, type: type, number: isBall ? "" : numInput.value, keyframes: { [currentFrame]: { x, y } } };
    
    if (!isBall) numInput.value++;
    entities.push(newEn); draggedEntity = selectedEntity = newEn; updateEditor(); render();
});

cv.addEventListener('mousemove', e => {
    if (isPlaying || !draggedEntity) return;
    const r = cv.getBoundingClientRect();
    draggedEntity.keyframes[currentFrame] = { x: e.clientX - r.left, y: e.clientY - r.top };
    updateEditor(); render();
});

cv.addEventListener('mouseup', () => draggedEntity = null);
timeline.addEventListener('input', e => { if(isPlaying) return; currentFrame = +e.target.value; frameDisplay.innerText = currentFrame; render(); });

// 재생 기능 (배속 조절 포함)
function advanceFrame() {
    if (!isPlaying) return;
    if (currentFrame < maxFrames) {
        currentFrame++; timeline.value = currentFrame; frameDisplay.innerText = currentFrame; render();
        // 배속 값 곱하기 (1배속=20ms, 2배속=10ms, 0.5배속=40ms)
        animationTimer = setTimeout(advanceFrame, 20 * parseFloat(speedSelect.value));
    } else {
        isPlaying = false; playBtn.textContent = "▶ 재생";
    }
}

playBtn.addEventListener('click', () => {
    if (isPlaying) { isPlaying = false; clearTimeout(animationTimer); playBtn.textContent = "▶ 재생"; } 
    else { isPlaying = true; if (currentFrame >= maxFrames) currentFrame = 0; selectedEntity = null; updateEditor(); playBtn.textContent = "⏸ 일시정지"; advanceFrame(); }
});

resetBtn.addEventListener('click', () => {
    isPlaying = false; clearTimeout(animationTimer); playBtn.textContent = "▶ 재생";
    entities = []; selectedEntity = null; currentFrame = 0; timeline.value = 0; frameDisplay.innerText = 0; numInput.value = 1; updateEditor(); render();
});

// GIF 추출 (프로그레스 바 텍스트 표시 추가)
exportBtn.addEventListener('click', () => {
    if (isPlaying) playBtn.click();
    exportBtn.disabled = true; selectedEntity = null; updateEditor();
    
    const workerBlob = new Blob([`importScripts('https://cdnjs.cloudflare.com/ajax/libs/gif.js/0.2.0/gif.worker.js');`], { type: 'application/javascript' });
    const gif = new window.GIF({ workers: 2, quality: 10, width: 800, height: 500, workerScript: URL.createObjectURL(workerBlob) });
    
    const sFrame = currentFrame;
    for (let f = 0; f <= maxFrames; f += 2) { currentFrame = f; render(true); gif.addFrame(cv, { copy: true, delay: 40 }); }
    
    gif.on('progress', p => exportBtn.innerText = `⏳ 렌더링... ${Math.round(p * 100)}%`);
    gif.on('finished', b => {
        const a = document.createElement('a'); a.href = URL.createObjectURL(b); a.download = 'goal_clip.gif'; a.click();
        currentFrame = sFrame; render(); exportBtn.innerText = "📷 GIF 추출"; exportBtn.disabled = false;
    });
    gif.render();
});

render();
updateEditor();
</script>
</body>
</html>
