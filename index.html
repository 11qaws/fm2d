<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"><title>Tactics Maker Pro</title><script src="https://cdnjs.cloudflare.com/ajax/libs/gif.js/0.2.0/gif.js"></script><style>body{font-family:sans-serif;background:#f0f2f5;user-select:none;color:#333}#c,#b{max-width:920px;margin:10px auto;background:#fff;padding:12px;border-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,.1)}#c{display:flex;gap:12px;align-items:center;flex-wrap:wrap}button{padding:6px 12px;cursor:pointer;font-weight:bold;border:none;border-radius:4px;transition:.2s}button:hover{filter:brightness(90%)}canvas{background:#27ae60;display:block;margin:0 auto;box-shadow:0 5px 15px rgba(0,0,0,.2);border-radius:8px}.kr{display:flex;gap:5px;align-items:center;background:#f8f9fa;padding:5px;border-radius:4px;border:1px solid #ddd;font-size:13px}.ki{width:45px;font-weight:bold;color:#d35400;text-align:center}.bd{background:#e74c3c;color:#fff;padding:2px 5px}.badge{background:#34495e;color:#fff;padding:2px 6px;border-radius:4px;font-size:11px}</style></head><body>

</div>

</div>

<script>
const C=document.getElementById('cv'),X=C.getContext('2d'),d=document,hc=d.getElementById('hc'),ac=d.getElementById('ac'),nI=d.getElementById('n'),pB=d.getElementById('pB'),rB=d.getElementById('rB'),gB=d.getElementById('gB'),fB=d.getElementById('fB'),tl=d.getElementById('tl'),fd=d.getElementById('fd'),kl=d.getElementById('kl'),vC=d.getElementById('vC'),sP=d.getElementById('sP');
let E=[],P=0,cF=0,D=null,S=null,T,spd=20;hc.oninput=ac.oninput=vC.onchange=sP.onchange=()=>R();

function dP(){X.fillStyle="#27ae60";X.fillRect(0,0,800,500);X.strokeStyle="#fff";X.lineWidth=2;X.strokeRect(40,20,720,460);X.beginPath();X.moveTo(400,20);X.lineTo(400,480);X.stroke();X.beginPath();X.arc(400,250,70,0,Math.PI*2);X.stroke();X.strokeRect(40,100,120,300);X.strokeRect(640,100,120,300);X.strokeRect(40,180,40,140);X.strokeRect(720,180,40,140)}

function uE(){if(!S){kl.innerHTML="<span style='color:#7f8c8d;font-size:14px'>객체(선수/공)를 클릭하면 프레임 편집기, Undo, 등속도 보정 메뉴가 나타납니다.</span>";return}let h=`<div style="margin-bottom:8px;display:flex;align-items:center;gap:10px"><b>선택됨: ${S.b?'공':(S.t=='h'?'홈':'어웨이')+' #'+S.n}</b> <button onclick="uD()" style="background:#34495e;color:#fff">↩ 이전 경로 지우기 (Undo)</button><button onclick="aS()" style="background:#f39c12;color:#fff">✨ 구간 등속도 자동 맞춤</button></div><div style="display:flex;flex-wrap:wrap;gap:8px">`;let k=Object.keys(S.k).map(Number).sort((a,b)=>a-b);k.forEach((f,i)=>{h+=`<div class="kr">P${i+1}: <input type="number" class="ki" data-o="${f}" value="${f}"><button class="bd" data-f="${f}">X</button></div>`});kl.innerHTML=h+"</div>";d.querySelectorAll('.ki').forEach(I=>I.onchange=e=>{let o=+e.target.dataset.o,n=+e.target.value;if(n<0)n=0;if(n>200)n=200;while(S.k[n]&&n!==o)n++;S.k[n]=S.k[o];delete S.k[o];uE();R()});d.querySelectorAll('.bd').forEach(B=>B.onclick=e=>{delete S.k[+e.target.dataset.f];if(!Object.keys(S.k).length){E=E.filter(x=>x!==S);S=null}uE();R()})}
window.uD=()=>{if(!S)return;let k=Object.keys(S.k).map(Number).sort((a,b)=>a-b);if(k.length>1)delete S.k[k[k.length-1]];uE();R()};
window.aS=()=>{let k=Object.keys(S.k).map(Number).sort((a,b)=>a-b);if(k.length<3)return;let f1=k[0],f2=k[k.length-1],t=f2-f1,td=0,D=[];for(let i=0;i<k.length-1;i++){let d=Math.hypot(S.k[k[i+1]].x-S.k[k[i]].x,S.k[k[i+1]].y-S.k[k[i]].y);D.push(d);td+=d}if(!td)return;let nK={[f1]:S.k[f1]},A=f1;for(let i=0;i<k.length-2;i++){A+=(D[i]/td)*t;let nF=Math.round(A);while(nK[nF])nF++;nK[nF]=S.k[k[i+1]]}nK[f2]=S.k[f2];S.k=nK;uE();R()};
fB.onclick=()=>{E=[];cF=0;tl.value=fd.innerText=0;S=null;let hm=[[80,250],[160,100],[160,200],[160,300],[160,400],[280,100],[280,200],[280,300],[280,400],[360,180],[360,320]];let aw=[[720,250],[640,100],[640,200],[640,300],[640,400],[520,100],[520,200],[520,300],[520,400],[440,180],[440,320]];hm.forEach((p,i)=>E.push({b:0,t:'h',n:i+1,k:{0:{x:p[0],y:p[1]}}}));aw.forEach((p,i)=>E.push({b:0,t:'a',n:i+1,k:{0:{x:p[0],y:p[1]}}}));E.push({b:1,t:'b',n:'',k:{0:{x:400,y:250}}});uE();R()};
C.onmousedown=e=>{if(P)return;let r=C.getBoundingClientRect(),x=e.clientX-r.left,y=e.clientY-r.top,H=null;for(let en of E){let p=gP(en,cF);if(p&&Math.hypot(p.x-x,p.y-y)<=20){H=en;break}}if(H){D=S=H;uE();R();return}let t=d.querySelector('input[name="t"]:checked').value,b=t=='b',nE={b,t,n:b?"":nI.value,k:{[cF]:{x,y}}};if(!b)nI.value++;E.push(nE);D=S=nE;uE();R()};
C.onmousemove=e=>{if(P||!D)return;let r=C.getBoundingClientRect();D.k[cF]={x:e.clientX-r.left,y:e.clientY-r.top};uE();R()};C.onmouseup=()=>D=null;tl.oninput=e=>{if(P)return;cF=+e.target.value;fd.innerText=cF;R()};
function A(){if(!P)return;if(cF<200){cF++;tl.value=fd.innerText=cF;R();T=setTimeout(A,20*parseFloat(sP.value))}else P=0,pB.innerText="▶ 재생"}
pB.onclick=()=>{if(P){P=0;clearTimeout(T);pB.innerText="▶ 재생"}else{P=1;if(cF>=200)cF=0;S=null;uE();pB.innerText="⏸ 일시정지";A()}};rB.onclick=()=>{P=0;clearTimeout(T);E=[];S=null;cF=tl.value=fd.innerText=0;nI.value=1;pB.innerText="▶ 재생";uE();R()};
gB.onclick=()=>{if(P)pB.click();gB.disabled=1;S=null;uE();let w=new Blob([`importScripts('https://cdnjs.cloudflare.com/ajax/libs/gif.js/0.2.0/gif.worker.js');`],{type:'text/javascript'});let g=new window.GIF({workers:2,quality:10,width:800,height:500,workerScript:URL.createObjectURL(w)});let s=cF;for(let f=0;f<=200;f+=2){cF=f;R(1);g.addFrame(C,{copy:1,delay:40})}g.on('progress',p=>gB.innerText=`⏳ 렌더링... ${Math.round(p*100)}%`);g.on('finished',b=>{let a=d.createElement('a');a.href=URL.createObjectURL(b);a.download='goal_clip.gif';a.click();cF=s;R();gB.innerText="📷 GIF 추출";gB.disabled=0});g.render()};
