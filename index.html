<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"><title>FM 2D Tactics</title><script src="https://cdnjs.cloudflare.com/ajax/libs/gif.js/0.2.0/gif.js"></script><style>body{font-family:sans-serif;background:#f4f6f9;user-select:none}#c{max-width:800px;margin:10px auto;display:flex;gap:15px;background:#fff;padding:10px;border-radius:8px}button{padding:5px 10px;cursor:pointer;font-weight:bold}canvas{background:#27ae60;display:block;margin:0 auto;box-shadow:0 5px 15px rgba(0,0,0,0.2);border-radius:8px}</style></head><body><div id="c"><input type="color" id="h" value="#e74c3c"><label><input type="radio" name="t" value="h" checked>홈</label><input type="color" id="a" value="#3498db"><label><input type="radio" name="t" value="a">어웨이</label><label><input type="radio" name="t" value="b">공</label><input type="number" id="n" value="1" style="width:40px;text-align:center"><button id="pBtn">▶재생</button><button id="rBtn">초기화</button><button id="gBtn">📷GIF추출</button><div style="margin-left:auto">타임라인: <input type="range" id="tl" min="0" max="200" value="0"><span id="fd">0</span>/200</div></div><canvas id="cv" width="800" height="500"></canvas><script>
const C=document.getElementById('cv'),X=C.getContext('2d'),d=document,hC=d.getElementById('h'),aC=d.getElementById('a'),nI=d.getElementById('n'),pB=d.getElementById('pBtn'),rB=d.getElementById('rBtn'),gB=d.getElementById('gBtn'),tl=d.getElementById('tl'),fd=d.getElementById('fd');let E=[],P=0,cF=0,D=null,T;hC.oninput=aC.oninput=()=>R();
function R(h=0){X.fillStyle="#27ae60";X.fillRect(0,0,800,500);X.strokeStyle="#fff";X.lineWidth=2;X.strokeRect(40,20,720,460);X.beginPath();X.moveTo(400,20);X.lineTo(400,480);X.stroke();X.beginPath();X.arc(400,250,70,0,Math.PI*2);X.stroke();X.strokeRect(40,100,120,300);X.strokeRect(640,100,120,300);if(!h)E.forEach(e=>{let k=Object.keys(e.k).map(Number).sort((x,y)=>x-y);if(k.length>1){X.beginPath();X.strokeStyle=e.b?"#fff":"#ff0";X.moveTo(e.k[k[0]].x,e.k[k[0]].y);for(let i=1;i<k.length;i++)X.lineTo(e.k[k[i]].x,e.k[k[i]].y);X.stroke()}});E.forEach(e=>{let p=gP(e,cF);if(!p)return;X.beginPath();X.arc(p.x,p.y,e.b?7:14,0,Math.PI*2);X.fillStyle=e.b?"#fff":e.t=='h'?hC.value:aC.value;X.fill();X.stroke();if(!e.b){X.fillStyle="#fff";X.font="bold 12px Arial";X.textAlign="center";X.textBaseline="middle";X.fillText(e.n,p.x,p.y)}})}
function gP(e,f){let k=Object.keys(e.k).map(Number).sort((x,y)=>x-y);if(!k.length)return null;if(f<=k[0])return e.k[k[0]];if(f>=k[k.length-1])return e.k[k[k.length-1]];let f1=k[0],f2=k[k.length-1];for(let x of k){if(x<=f)f1=x;if(x>=f){f2=x;break}}let p1=e.k[f1],p2=e.k[f2],r=(f-f1)/(f2-f1);return f1==f2?p1:{x:p1.x+(p2.x-p1.x)*r,y:p1.y+(p2.y-p1.y)*r}}
C.onmousedown=e=>{if(P)return;let r=C.getBoundingClientRect(),x=e.clientX-r.left,y=e.clientY-r.top;for(let en of E){let p=gP(en,cF);if(p&&Math.hypot(p.x-x,p.y-y)<=20)return D=en;}let t=d.querySelector('input[name="t"]:checked').value,b=t=='b';E.push({b,t,n:b?"":nI.value,k:{[cF]:{x,y}}});if(!b)nI.value++;R()};
C.onmousemove=e=>{if(P||!D)return;let r=C.getBoundingClientRect();D.k[cF]={x:e.clientX-r.left,y:e.clientY-r.top};R()};C.onmouseup=()=>D=null;tl.oninput=e=>{if(P)return;cF=+e.target.value;fd.innerText=cF;R()};
function A(){if(!P)return;if(cF<200){cF++;tl.value=fd.innerText=cF;R();T=setTimeout(A,20)}else P=0,pB.innerText="▶재생"}
pB.onclick=()=>{if(P){P=0;clearTimeout(T);pB.innerText="▶재생"}else{P=1;if(cF>=200)cF=0;pB.innerText="⏸정지";A()}};rB.onclick=()=>{P=0;clearTimeout(T);E=[];cF=tl.value=fd.innerText=0;nI.value=1;pB.innerText="▶재생";R()};
gB.onclick=()=>{if(P)pB.click();gB.innerText="⏳인코딩..";let w=new Blob([`importScripts('https://cdnjs.cloudflare.com/ajax/libs/gif.js/0.2.0/gif.worker.js');`],{type:'text/javascript'});let g=new window.GIF({workers:2,width:800,height:500,workerScript:URL.createObjectURL(w)});let s=cF;for(let f=0;f<=200;f+=2){cF=f;R(1);g.addFrame(C,{copy:1,delay:40})}g.on('finished',b=>{let a=d.createElement('a');a.href=URL.createObjectURL(b);a.download='tactics.gif';a.click();cF=s;R();gB.innerText="📷GIF추출"});g.render()};R();
</script></body></html>
